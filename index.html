<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPBD my bff</title>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #FFE4E1, #D8BFD8, #ADD8E6);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .left, .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left img {
            width: 80%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            text-align: center;
            width: 80%;
            max-width: 450px;
        }

        h1 { color: #ff69b4; }
        p { color: #333; }

        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .rotating {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="music-control" id="musicBtn" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
    </div>


    <audio id="myAudio" autoplay loop muted>
        <source src="blue.mp3" type="audio/mpeg">
    </audio>

    <div class="left">
        <img src="Locket_1774361475625_93.jpg">
    </div>

    <div class="right">
        <div class="container">
            <h1>Happy Birthday my best friend 🥰</h1>
            <p>Chúc m luôn mạnh khỏe, hạnh phúc và thành công 💖</p>
            <p>Have a happy sixteen! 🍀</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const musicBtn = document.getElementById("musicBtn");
        const musicIcon = document.getElementById("musicIcon");

        document.body.addEventListener("click", () => {
            audio.muted = false;
            audio.play();
            musicBtn.classList.add("rotating");
            musicIcon.innerHTML = "⏸️";
        }, { once: true });
