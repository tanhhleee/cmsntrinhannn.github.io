<!DOCTYPE html> 
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎂</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 50px;
            font-size: 50px;
        }

        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin: 10px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #ff6f61;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #ffffff;
            color: black;
        }
    </style>
</head>
<body>

<h1>🎉 Happy Birthday Best Friend 🎂</h1>

<p>Chúc mừng sinh nhật người bạn thân nhất của tôi 💖</p>

<div class="gallery">
    <img src="anh1.png" alt="friend">
</div>

<button onclick="showMessage()">Mở quà 🎁</button>

<p id="message"></p>

<script>
function showMessage() {
    document.getElementById("message").innerHTML =
    "🎊 cũng 5 năm kể từ khi t vs m làm bạn r nhỉ, k bt có bao nhiêu cái sn trôi qua mà t quên chúc rồi (tầm 2 cái), t cx k nhớ, nhưng năm nay t nhớ r, nhớ cả những kỷ niệm ngày xưa nữa. Sang tuổi mới, t chúc m xinh đẹp, học giỏi hơn và tự tin trên con đường m chọn nhé! 🎊";
}
</script>

</body>
</html>
