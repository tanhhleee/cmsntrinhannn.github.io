<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPBD my bff</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #FFE4E1, #D8BFD8, #ADD8E6);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .left, .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .left img {
            width: 80%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            animation: fadeIn 1.5s ease;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            text-align: center;
            width: 80%;
            max-width: 450px;
        }

        h1 { color: #ff69b4; }
        p { color: #333; line-height: 1.6; }

    
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        
        .rotating {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: float 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="music-control" id="musicBtn" onclick="toggleMusic()">
        <span id="musicIcon">🎵</span>
    </div>

    <audio id="myAudio" loop>
        <source src="blue.mp3" type="audio/mpeg">
    </audio>

    <div class="left">
        <img src="Locket_1774361475625_93.jpg">
    </div>

    <div class="right">
        <div class="container">
            <h1>Happy Birthday my best friend 🥰🥰🥰</h1>
            <p>Hôm nay là ngày sinh nhật của m, t muốn gửi đến m những lời chúc tốt đẹp nhất. Chúc m luôn mạnh khỏe, hạnh phúc và thành công trên con đường mà mình lựa chọn.</p> 
            <p>Cảm ơn m vì đã là người bạn tốt nhất của t</p>
            <p>have a happy sixteen!🍀</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const musicBtn = document.getElementById("musicBtn");
        const musicIcon = document.getElementById("musicIcon");

        // Hàm bật/tắt nhạc
        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicBtn.classList.add("rotating");
                musicIcon.innerHTML = "⏸️"; 
            } else {
                audio.pause();
                musicBtn.classList.remove("rotating");
                musicIcon.innerHTML = "🎵"; 
            }
        }

        document.body.addEventListener('click', function() {
            if (audio.paused) {
                toggleMusic();
            }
        }, { once: true });

        // Hiệu ứng tim bay (giữ nguyên)
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>

</body>
</html>
